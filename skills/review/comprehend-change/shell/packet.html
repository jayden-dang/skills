<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Comprehension packet</title>
<style>
  :root {
    --bg: #0f1419;
    --fg: #e7ecf1;
    --muted: #9aa7b2;
    --card: #1a222c;
    --accent: #5b9fd4;
    --ok: #3d9a6a;
    --bad: #c45c5c;
    --border: #2a3540;
    --focus: #f0c14b;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f7f8fa;
      --fg: #1a1f24;
      --muted: #5c6b76;
      --card: #ffffff;
      --accent: #1a6fa8;
      --ok: #1f7a4c;
      --bad: #a83232;
      --border: #d0d7de;
      --focus: #b8860b;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0 auto;
    max-width: 48rem;
    padding: 1.25rem 1rem 3rem;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    line-height: 1.55;
    color: var(--fg);
    background: var(--bg);
  }
  h1 { font-size: 1.6rem; margin: 0 0 0.35rem; }
  h2 { font-size: 1.25rem; margin-top: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
  .muted { color: var(--muted); font-size: 0.95rem; }
  .summary { margin: 0.75rem 0 1.25rem; }
  .scope-notice {
    background: var(--card);
    border-left: 4px solid var(--focus);
    padding: 0.75rem 1rem;
    margin: 1rem 0;
  }
  nav.toc {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    margin: 1rem 0 1.5rem;
  }
  nav.toc ol { margin: 0.4rem 0 0; padding-left: 1.25rem; }
  nav.toc a { color: var(--accent); }
  .callout {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    margin: 0.75rem 0;
  }
  .diagram {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    margin: 0.75rem 0;
    overflow-x: auto;
  }
  pre, pre code {
    white-space: pre-wrap;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.88rem;
  }
  pre {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.85rem 1rem;
    overflow-x: auto;
  }
  .quiz-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    margin: 1rem 0;
  }
  .quiz-card h3 { margin: 0 0 0.75rem; font-size: 1.05rem; }
  .option {
    display: block;
    width: 100%;
    text-align: left;
    margin: 0.4rem 0;
    padding: 0.65rem 0.85rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    font: inherit;
  }
  .option:hover { border-color: var(--accent); }
  .option:focus-visible {
    outline: 3px solid var(--focus);
    outline-offset: 2px;
  }
  .option[disabled] { cursor: default; opacity: 0.95; }
  .option.correct {
    border-color: var(--ok);
    box-shadow: inset 0 0 0 1px var(--ok);
  }
  .option.wrong {
    border-color: var(--bad);
    box-shadow: inset 0 0 0 1px var(--bad);
  }
  .feedback {
    margin-top: 0.75rem;
    padding: 0.65rem 0.85rem;
    border-radius: 8px;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: color-mix(in srgb, var(--ok) 18%, transparent); }
  .feedback.bad { background: color-mix(in srgb, var(--bad) 18%, transparent); }
  .feedback .label { font-weight: 700; }
  .dec-cite { font-size: 0.9rem; color: var(--muted); }
  @media (max-width: 600px) {
    body { padding: 1rem 0.75rem 2.5rem; }
  }
</style>
</head>
<body>
<header>
  <h1 id="title">Comprehension packet</h1>
  <p class="muted" id="meta"></p>
  <p class="summary" id="summary"></p>
  <div class="scope-notice" id="scope-notice" hidden></div>
</header>

<nav class="toc" aria-label="Table of contents">
  <strong>Contents</strong>
  <ol>
    <li><a href="#background">Background</a></li>
    <li><a href="#intuition">Intuition</a></li>
    <li><a href="#code">Code</a></li>
    <li><a href="#quiz">Quiz</a></li>
  </ol>
</nav>

<section id="background">
  <h2>Background</h2>
  <div id="background-deep"></div>
  <div id="background-narrow"></div>
  <div id="dec-blocks"></div>
</section>

<section id="intuition">
  <h2>Intuition</h2>
  <div id="intuition-body"></div>
</section>

<section id="code">
  <h2>Code</h2>
  <div id="code-body"></div>
</section>

<section id="quiz">
  <h2>Quiz</h2>
  <p class="muted">Five questions. Pick an answer to check your understanding. Scores stay on this page only.</p>
  <div id="quiz-root"></div>
</section>

<script>
/* __PACKET_DATA__ */
const PACKET = window.__PACKET__ || {
  title: "Sample packet",
  summary: "Replace __PACKET_DATA__ with real content.",
  seed: "demo",
  scope_notice: "",
  background_deep: "<p>Deep background placeholder.</p>",
  background_narrow: "<p>Narrow background placeholder.</p>",
  intuition: "<p>Intuition placeholder.</p>",
  code_walk: "<p>Code walk placeholder.</p>",
  dec_blocks: "",
  quiz: [
    { prompt: "Q1?", options: ["A", "B", "C", "D"], correctIndex: 0, feedbackCorrect: "Yes.", feedbackWrong: ["No.", "No.", "No.", "No."] },
    { prompt: "Q2?", options: ["A", "B", "C", "D"], correctIndex: 1, feedbackCorrect: "Yes.", feedbackWrong: ["No.", "No.", "No.", "No."] },
    { prompt: "Q3?", options: ["A", "B", "C", "D"], correctIndex: 2, feedbackCorrect: "Yes.", feedbackWrong: ["No.", "No.", "No.", "No."] },
    { prompt: "Q4?", options: ["A", "B", "C", "D"], correctIndex: 3, feedbackCorrect: "Yes.", feedbackWrong: ["No.", "No.", "No.", "No."] },
    { prompt: "Q5?", options: ["A", "B", "C", "D"], correctIndex: 0, feedbackCorrect: "Yes.", feedbackWrong: ["No.", "No.", "No.", "No."] }
  ]
};

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function hashSeed(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

function mulberry32(a) {
  return function () {
    let t = (a += 0x6d2b79f5);
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function shuffleOptions(options, correctIndex, rng) {
  const items = options.map((text, i) => ({ text, correct: i === correctIndex }));
  for (let i = items.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [items[i], items[j]] = [items[j], items[i]];
  }
  return items;
}

function render() {
  const p = PACKET;
  document.getElementById("title").textContent = p.title || "Comprehension packet";
  document.title = p.title || "Comprehension packet";
  document.getElementById("summary").textContent = p.summary || "";
  document.getElementById("meta").textContent = p.meta || "";
  const sn = document.getElementById("scope-notice");
  if (p.scope_notice) {
    sn.hidden = false;
    sn.innerHTML = "<strong>Scope notice:</strong> " + escapeHtml(p.scope_notice);
  }
  document.getElementById("background-deep").innerHTML = p.background_deep || "";
  document.getElementById("background-narrow").innerHTML = p.background_narrow || "";
  document.getElementById("dec-blocks").innerHTML = p.dec_blocks || "";
  document.getElementById("intuition-body").innerHTML = p.intuition || "";
  document.getElementById("code-body").innerHTML = p.code_walk || "";

  const root = document.getElementById("quiz-root");
  root.innerHTML = "";
  const seed = String(p.seed || p.title || "seed");
  const quiz = Array.isArray(p.quiz) ? p.quiz.slice(0, 5) : [];
  quiz.forEach((q, qi) => {
    const rng = mulberry32(hashSeed(seed + ":" + qi));
    const shuffled = shuffleOptions(q.options || [], q.correctIndex | 0, rng);
    const card = document.createElement("div");
    card.className = "quiz-card";
    card.innerHTML = "<h3>" + escapeHtml(String(qi + 1) + ". " + (q.prompt || "")) + "</h3>";
    const feedback = document.createElement("div");
    feedback.className = "feedback";
    feedback.setAttribute("role", "status");
    feedback.setAttribute("aria-live", "polite");

    shuffled.forEach((opt, oi) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "option";
      btn.textContent = opt.text;
      btn.addEventListener("click", () => {
        if (card.dataset.answered) return;
        card.dataset.answered = "1";
        Array.from(card.querySelectorAll(".option")).forEach((b) => {
          b.disabled = true;
        });
        if (opt.correct) {
          btn.classList.add("correct");
          feedback.classList.add("show", "ok");
          feedback.innerHTML = '<span class="label">Correct. </span>' + escapeHtml(q.feedbackCorrect || "Right.");
        } else {
          btn.classList.add("wrong");
          const correctBtn = Array.from(card.querySelectorAll(".option")).find((_, idx) => shuffled[idx].correct);
          if (correctBtn) correctBtn.classList.add("correct");
          feedback.classList.add("show", "bad");
          const wrongMsg = (q.feedbackWrong && q.feedbackWrong[q.options.indexOf(opt.text)]) || "Not quite.";
          feedback.innerHTML = '<span class="label">Incorrect. </span>' + escapeHtml(wrongMsg);
        }
      });
      card.appendChild(btn);
    });
    card.appendChild(feedback);
    root.appendChild(card);
  });
}

render();
</script>
</body>
</html>
